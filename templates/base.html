<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Netflix Churn Analytics Portfolio{% endblock %}</title>
    <meta name="description" content="Enterprise-grade Netflix Customer Churn Analysis portfolio by Nikhil Khatri — AI, Machine Learning & Data Architecture.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar" id="main-navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">
                <span class="brand-icon">◆</span> NK Analytics
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a>
                <a href="{{ url_for('analytics') }}" class="{% if request.endpoint == 'analytics' %}active{% endif %}">Insights</a>
                <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="brand-icon">◆</span> NK Analytics
            </div>
            <p class="footer-copy">&copy; 2026 Nikhil Khatri. AI & Data Architecture Portfolio.</p>
            <div class="footer-links">
                <a href="https://github.com/NikhilKhatrii" target="_blank" rel="noopener">GitHub</a>
                <a href="https://www.linkedin.com/in/nikhil-khatrii/" target="_blank" rel="noopener">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
</body>
</html>
